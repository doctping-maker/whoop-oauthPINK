<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WHOOP Authorization Complete</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; line-height: 1.6;">
<h1>Authorization Complete</h1>
<p>You can return to Pink now.</p>
<p>If the URL contains a <code>code=...</code> parameter, copy that code and send it back.</p>

<script>
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if (code) {
const pre = document.createElement("pre");
pre.style.padding = "12px";
pre.style.background = "#f4f4f4";
pre.style.borderRadius = "8px";
pre.textContent = "Authorization code:\\n\\n" + code;
document.body.appendChild(pre);
}
</script>
</body>
</html>
